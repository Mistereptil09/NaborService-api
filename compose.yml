services:
  postgres:
    image: nabor_postgres:17-uuidv7
    container_name: nabor_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nabor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nabor_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nabor_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nabor} -d ${POSTGRES_DB:-nabor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7
    container_name: nabor_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-nabor}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-nabor_secret}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  neo4j:
    image: neo4j:5
    container_name: nabor_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-nabor_secret}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: nabor_redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-nabor_redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nabor_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: nabor_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  ban:
    image: etalab/addok
    container_name: nabor_ban
    ports:
      - "7878:7878"
    environment:
      - ADDOK_CONFIG_MODULE=/etc/addok/addok.conf
      - REDIS_PASSWORD=${REDIS_PASSWORD:-nabor_redis_secret}
    volumes:
      - ./docker/addok/addok.conf:/etc/addok/addok.conf
      - ban_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7878/search/?q=test > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./services/api
      dockerfile: ../../docker/api/Dockerfile
    container_name: nabor_api
    env_file: .env
    environment:
      # Network-level overrides (Docker service names, not localhost)
      POSTGRES_HOST: postgres
      MONGO_HOST: mongo
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
      DSL_SERVICE_URL: http://dsl-service:8000
      BAN_API_URL: http://ban:7878/search/
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dsl-service:
    build:
      context: ./services/dsl
      dockerfile: ../../docker/dsl/Dockerfile
    container_name: nabor_dsl_service
    environment:
      DSL_SERVICE_URL: http://dsl-service:8000
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  redis_data:
  ban_data:
