name: Build & Push Docker Images

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.ref }}" origin/main; then
            echo "❌ Tag '${{ github.ref_name }}' is NOT on the main branch. Aborting."
            exit 1
          fi
          echo "✅ Tag '${{ github.ref_name }}' is on main — proceeding."

  test:
    needs: gatekeeper
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      # Uncomment to also run e2e tests in CI
      # - name: Run e2e tests
      #   run: npm run test:e2e

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            context: ./services/api
            dockerfile: ./docker/api/Dockerfile
            image-name: nabor-api
          - service: dsl
            context: ./services/dsl
            dockerfile: ./docker/dsl/Dockerfile
            image-name: nabor-dsl-service
          - service: postgres
            context: ./docker/postgres
            dockerfile: ./docker/postgres/Dockerfile
            image-name: nabor-postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image path
        id: image
        run: |
          echo "image=${GHCR_REPO,,}" >> $GITHUB_OUTPUT
        env:
          GHCR_REPO: ghcr.io/${{ github.repository_owner }}/${{ matrix.image-name }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: prod
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ github.ref_name }}
