services:
  api:
    image: ghcr.io/mistereptil09/nabor-api:latest
    restart: unless-stopped

  dsl-service:
    image: ghcr.io/mistereptil09/nabor-dsl-service:latest
    restart: unless-stopped

  postgres:
    image: ghcr.io/mistereptil09/nabor-postgres:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"

  mongo:
    restart: unless-stopped

  neo4j:
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"

  redis:
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  ban:
    restart: unless-stopped
